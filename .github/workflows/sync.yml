name: Background Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_PAT_TOKEN }}

      - name: Setup Tools
        run: |
          chmod +x tools/xss_reflect_checker.py

      - name: Process Task
        run: |

          # === Run script_counter.py Tools ===
          if [ -s data/usefull-path-urls-1.txt ]; then
            python tools/script_counter.py -l data/usefull-path-urls-1.txt -l xss_results.txt -o script_stats.txt; cat script_stats.txt

          fi

          
          # === Run XSS Reflection Tools ===
          if [ -s data/usefull-path-urls-1.txt ]; then
            python tools/xss_reflect_checker.py -l data/usefull-path-urls-1.txt -p data/fuzz-params-list.txt

          fi



          

          # === Commit updated target list ===
          git config --global user.name "system"
          git config --global user.email "system@noreply.github.com"
          git add data/list.txt

          if ! git diff --cached --quiet; then
            git commit -m "chore: sync update" -q
            git push origin main -q
          fi
